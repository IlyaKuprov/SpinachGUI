name: Windows MSBuild

on:
  pull_request:
  push:
    branches:
      - main
      - talos/**
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [Win32, x64]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Copy portable NewGUI tree
        shell: cmd
        run: xcopy NewGUI "%RUNNER_TEMP%\SpinachGUI-NewGUI" /E /I /Y

      - name: Build portable NewGUI copy
        shell: cmd
        run: msbuild "%RUNNER_TEMP%\SpinachGUI-NewGUI\SpinachGUI.sln" /m /p:Configuration=%CONFIGURATION% /p:Platform=%PLATFORM% /p:RestorePackages=false
        env:
          CONFIGURATION: ${{ matrix.configuration }}
          PLATFORM: ${{ matrix.platform }}

      - name: Check portable build products
        shell: cmd
        run: |
          if not exist "%RUNNER_TEMP%\SpinachGUI-NewGUI\build\%PLATFORM%\%CONFIGURATION%\SpinachGui.exe" exit /b 1
          if not exist "%RUNNER_TEMP%\SpinachGUI-NewGUI\build\%PLATFORM%\%CONFIGURATION%\gTrackBar.dll" exit /b 1
          if not exist "%RUNNER_TEMP%\SpinachGUI-NewGUI\examples\Gaussian\urea.log" exit /b 1
        env:
          CONFIGURATION: ${{ matrix.configuration }}
          PLATFORM: ${{ matrix.platform }}
